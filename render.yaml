services:
  - type: web
    name: caja-piura-api
    runtime: python
    plan: free
    region: oregon
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://core-caja-piura.vercel.app,https://core-caja-piura-nsmn3w41v-pierox.vercel.app
      - key: DNI_API_BASE_URL
        value: https://dniruc.apisperu.com/api/v1/dni
      - key: DNI_API_TOKEN
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.8"
